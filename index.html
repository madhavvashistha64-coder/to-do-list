<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 320px;
  text-align: center;
}

input {
  width: 70%;
  padding: 10px;
}

button {
  padding: 10px;
  background: #667eea;
  color: white;
  border: none;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 15px;
}

li {
  background: #f1f1f1;
  margin: 5px 0;
  padding: 8px;
  display: flex;
  justify-content: space-between;
  border-radius: 5px;
}

.delete {
  color: red;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>📝 Todo App</h2>

  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function showTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    list.innerHTML += `
      <li>
        ${task}
        <span class="delete" onclick="deleteTask(${index})">❌</span>
      </li>
    `;
  });
}

function addTask() {
  const input = document.getElementById("taskInput");
  const value = input.value;

  if(value === "") {
    alert("Enter a task!");
    return;
  }

  tasks.push(value);
  localStorage.setItem("tasks", JSON.stringify(tasks));

  input.value = "";
  showTasks();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  showTasks();
}

// Load tasks on refresh
showTasks();
</script>

</body>
</html>
